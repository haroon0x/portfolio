services:
  - type: web
    name: haroon0x
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /blog
        destination: /blog/index.html
      - type: rewrite
        source: /blog/*
        destination: /index.html
      - type: rewrite
        source: /pull-requests
        destination: /pull-requests/index.html
      - type: rewrite
        source: /pull-requests/*
        destination: /index.html
