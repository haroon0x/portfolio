<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px;
      background: linear-gradient(180deg, #eef5fc 0%, #f6f7f5 38%, #faf8f4 70%);
      display: flex; align-items: center; justify-content: center;
      font-family: Manrope, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .sun-glow {
      position: absolute;
      top: -60px; right: -60px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,244,214,0.5), transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }
    .lily-bed {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      pointer-events: none;
    }
    .content {
      position: relative; z-index: 1;
      text-align: center;
    }
    h1 {
      font-family: 'Shippori Mincho', Georgia, serif;
      font-size: 80px; font-weight: 600;
      color: #1f2328;
      letter-spacing: 0.01em;
      line-height: 1.08;
    }
    .accent { color: #3e7a52; }
    .underline {
      display: inline-block;
      position: relative;
    }
    .underline::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 0;
      width: 100%; height: 3px;
      background: #a8821f;
      border-radius: 2px;
    }
    p {
      font-family: Manrope, sans-serif;
      font-size: 28px;
      color: #46525c;
      margin-top: 16px;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <div class="sun-glow"></div>
  <div class="lily-bed">
    <svg viewBox="0 0 1200 200" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="xMidYMax slice">
      <defs>
        <g id="lily">
          <path d="M40 70 C18 52 8 28 16 8 C30 18 42 38 44 62 Z" fill="#ffffff" stroke="#dfe5e2" stroke-width="1.5"/>
          <path d="M44 68 C36 42 38 16 52 2 C60 18 58 44 52 66 Z" fill="#fbfcfb" stroke="#dfe5e2" stroke-width="1.5"/>
          <path d="M48 70 C60 48 76 34 92 32 C86 50 70 64 54 72 Z" fill="#ffffff" stroke="#dfe5e2" stroke-width="1.5"/>
          <path d="M46 72 C64 66 80 68 90 78 C76 84 58 82 46 76 Z" fill="#f4f6f4" stroke="#dfe5e2" stroke-width="1.5"/>
          <path d="M42 74 C28 70 16 74 8 84 C20 90 34 86 42 78 Z" fill="#fbfcfb" stroke="#dfe5e2" stroke-width="1.5"/>
          <path d="M44 68 L40 44 M46 68 L48 42 M44 68 L52 48" stroke="#c9c2ae" stroke-width="1.2"/>
          <ellipse cx="39" cy="42" rx="3" ry="1.6" fill="#a8821f" transform="rotate(-30 39 42)"/>
          <ellipse cx="49" cy="40" rx="3" ry="1.6" fill="#a8821f" transform="rotate(15 49 40)"/>
          <ellipse cx="53" cy="46" rx="3" ry="1.6" fill="#a8821f" transform="rotate(40 53 46)"/>
        </g>
        <path id="leaf" d="M0 0 C24 -10 52 -8 78 14 C50 22 22 18 0 0 Z" fill="#5d8a6b"/>
      </defs>
      <path d="M60 200 C64 140 58 90 70 50" stroke="#4c7a5d" stroke-width="4" stroke-linecap="round"/>
      <use href="#leaf" x="40" y="150" transform="rotate(-18 40 150)"/>
      <use href="#lily" x="30" y="0" transform="matrix(1.1 0 0 1.1 0 0)"/>
      <path d="M150 200 C144 150 150 110 140 70" stroke="#5d8a6b" stroke-width="3.5" stroke-linecap="round"/>
      <use href="#leaf" x="130" y="155" transform="rotate(150 130 155) scale(-0.7 0.7)"/>
      <use href="#lily" x="120" y="30" transform="rotate(10 130 60) scale(0.7)"/>
      <path d="M1060 200 C1064 140 1058 90 1070 50" stroke="#4c7a5d" stroke-width="4" stroke-linecap="round"/>
      <use href="#leaf" x="1040" y="150" transform="rotate(18 1040 150)"/>
      <use href="#lily" x="1030" y="0" transform="matrix(0.9 0 0 0.9 0 0)"/>
      <path d="M1140 200 C1134 150 1140 110 1130 70" stroke="#5d8a6b" stroke-width="3" stroke-linecap="round"/>
      <use href="#lily" x="1120" y="40" transform="rotate(-12 1130 60) scale(0.65)"/>
    </svg>
  </div>
  <div class="content">
    <h1>haroon0x</h1>
    <p>AI/ML Engineer · Agents · Open Source</p>
    <div style="margin-top: 24px; width: 120px; height: 3px; background: #a8821f; border-radius: 2px; margin-left: auto; margin-right: auto;"></div>
  </div>
</body>
</html>
